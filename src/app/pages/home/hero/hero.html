<section class="hero" id="hero">
  <div class="hero-bg"></div>

  <div class="container hero-grid">
    <!-- LINKES COL: Foto + Icons + Mail -->
    <div class="hero-photo-wrap">
      <div class="photo-purple"></div>
      <div class="photo-green"></div>
      <img class="hero-photo" src="assets/hero.png" alt="Hero photo" />
    </div>

    <!-- RECHTES COL: Textblock -->
    <div class="hero-text">
      <!-- links senkrecht -->
      <span class="iam" aria-hidden="true">I am</span>

      <!-- rechts die Titel-Spalte -->
      <div class="title">
        <!-- Name: Zeile 1 = Muhammed, Zeile 2 = Yunus Amini -->
        <h1 class="name">
          <span class="name-row">Muhammed</span>
          <span class="name-row">Yunus <span class="accent">Amini</span></span>
        </h1>

        <h2 class="role">FRONTEND DEVELOPER</h2>

        <!-- CTA zentriert und professionell groß -->
        <div class="hero-cta">
          <button
            class="btn btn--primary"
            type="button"
            (click)="scrollTo('contact')"
            aria-label="Scroll to contact">
            Let’s talk!
          </button>
        </div>
      </div>
    </div>

    <!-- Icons + Mail (unter dem Bild, wie im Figma) -->
    <div class="hero-contact">
      <div class="hero-socials">
        <a class="ico" href="https://github.com/mya63" target="_blank" rel="noopener" aria-label="GitHub">
          <img src="assets/giticon.png" alt="GitHub" width="30" height="30" />
        </a>
        <a class="ico" href="mailto:muhammedyunusamini4@gmail.com" aria-label="Email">
          <img src="assets/email.png" alt="Email" width="30" height="30" />
        </a>
        <a class="ico" href="https://www.linkedin.com/in/muhammed-yunus-amini-5380b829a/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <img src="assets/linkedin.png" alt="LinkedIn" width="30" height="30" />
        </a>
      </div>

      <a class="hero-mail" href="mailto:muhammedyunusamini4@gmail.com">
        muhammedyunusamini4@gmail.com
      </a>
    </div>

    <!-- Scroll down: vertikal, Pfeil zeigt nach unten -->
    <div class="scrolldown">
      <span>Scroll down</span>
      <svg class="arrow" viewBox="0 0 24 24" width="24" height="24" fill="#fff">
        <path d="M12 16 6 10h12l-6 6Z" />
      </svg>
    </div>
  </div>
</section>
