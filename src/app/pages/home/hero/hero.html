<section class="hero" id="hero">
  <div class="hero-bg" aria-hidden="true"></div>
  <picture class="hero-wave-picture">
    <source
      srcset="assets/Vector-wide.svg"
      media="(min-width: 1545px) and (min-height: 898.5px) and (max-height: 899.98px)"
    />
    <source
      srcset="assets/Vector-wide.svg"
      media="(min-width: 1600px) and (min-height: 900px)"
    />
    <img class="hero-wave" src="assets/Vector.svg" alt="" aria-hidden="true" />
  </picture>

  <div class="container hero-grid">
    <div class="hero-photo-wrap" aria-hidden="true">
      <div class="photo-purple"></div>
      <div class="photo-green"></div>
      <img class="hero-photo" src="assets/hero.png" alt="" />
    </div>

    <div class="hero-text">
      <span class="iam">{{ 'hero.iam' | t }}</span>

      <div class="hero-copy">
        <h1 class="name">
          <span>Muhammed Yunus</span>
          <span><span class="accent">Amini</span></span>
        </h1>

        <h2 class="role">{{ 'hero.role' | t }}</h2>

        <div class="hero-cta">
          <button class="btn btn--primary" type="button" (click)="scrollTo('contact')">
            {{ 'hero.talk' | t }}
          </button>
        </div>
      </div>
    </div>

    <div class="hero-contact" aria-label="Social links">
      <div class="hero-socials">
        <a class="ico" href="https://github.com/mya63" target="_blank" rel="noopener">
          <img src="assets/giticon.png" alt="GitHub" />
        </a>

        <a class="ico" href="mailto:contact@yunusamini.dev">
          <img src="assets/email.png" alt="Email" />
        </a>

        <a
          class="ico"
          href="https://www.linkedin.com/in/muhammed-yunus-amini-5380b829a/"
          target="_blank"
          rel="noopener"
        >
          <img src="assets/linkedin.png" alt="LinkedIn" />
        </a>
      </div>

      <a class="hero-mail" href="mailto:contact@yunusamini.dev">contact@yunusamini.dev</a>
    </div>

    <button class="scrolldown" type="button" (click)="scrollTo('about')">
      <span>{{ 'misc.scrolldown' | t }}</span>
      <svg class="arrow" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
        <path d="M12 16 6 10h12l-6 6Z" />
      </svg>
    </button>
  </div>
</section>
