<section class="hero" id="hero">
  <div class="hero-bg"></div>

  <img
  class="hero-wave"
  src="assets/hero-wave.svg"
  alt=""
  aria-hidden="true"
/>

  <div class="container hero-grid">
    <!-- LINKES COL: Foto + Icons + Mail -->
    <div class="hero-photo-wrap">
      <div class="photo-purple"></div>
      <div class="photo-green"></div>
      <img class="hero-photo" src="assets/hero.png" alt="Hero photo" />
    </div>

    <!-- RECHTES COL: Textblock -->
    <div class="hero-text">
      <span class="iam" aria-hidden="true">I am</span>

      <div class="title">
        <h1 class="name">
          <span class="name-row">Muhammed</span>
          <span class="name-row">Yunus <span class="accent">Amini</span></span>
        </h1>

        <h2 class="role">FULLSTACK DEVELOPER</h2>

        <p class="hero-sub">Clean Code · Responsive Design · Real Projects</p>

        <div class="hero-cta">
          <button
            class="btn btn--primary"
            type="button"
            (click)="scrollTo('contact')"
          >
            Let’s talk!
          </button>
        </div>
      </div>
    </div>

    <!-- Icons + Mail -->
    <div class="hero-contact">
      <div class="hero-socials">
        <a class="ico" href="https://github.com/mya63" target="_blank">
          <img src="assets/giticon.png" alt="GitHub" />
        </a>

        <a class="ico" href="mailto:muhammedyunusamini4@gmail.com">
          <img src="assets/email.png" alt="Email" />
        </a>

        <a
          class="ico"
          href="https://www.linkedin.com/in/muhammed-yunus-amini-5380b829a/"
          target="_blank"
        >
          <img src="assets/linkedin.png" alt="LinkedIn" />
        </a>
      </div>

      <a class="hero-mail" href="mailto:muhammedyunusamini4@gmail.com">
        muhammedyunusamini4@gmail.com
      </a>
    </div>

    <!-- Scroll down -->
    <div class="scrolldown">
      <span>Scroll down</span>
      <svg class="arrow" viewBox="0 0 24 24" width="24" height="24">
        <path d="M12 16 6 10h12l-6 6Z" />
      </svg>
    </div>
  </div>
</section>
