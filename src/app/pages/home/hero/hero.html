<section class="hero" id="hero">
  <div class="hero-bg"></div>
  <div class="container hero-grid">

    <div class="hero-photo-wrap">
      <div class="photo-purple"></div>
      <div class="photo-green"></div>
      <img class="hero-photo" src="assets/hero.png" alt="Hero photo" />
    </div>

    <div class="hero-text">
      <span class="iam">{{ 'hero.iam' | t }}</span>
      <h1 class="name">Muhammed <br /> Yunus <span class="accent">Amini</span></h1>
      <h2 class="role">{{ 'hero.role' | t }}</h2>

      <!-- Button: smooth scroll zu #contact -->
      <button
        class="btn btn--primary"
        type="button"
        (click)="scrollTo('contact')"
        aria-label="Scroll to contact">
        {{ 'hero.talk' | t }}
      </button>

<div class="hero-socials">
  <a class="ico" href="https://github.com/mya63" target="_blank" rel="noopener" aria-label="GitHub">
    <img src="assets/giticon.png" alt="GitHub" width="30" height="30" />
  </a>
  <a class="ico" href="mailto:muhammedyunusamini4@gmail.com" aria-label="Email">
    <img src="assets/email.png" alt="Email" width="30" height="30" />
  </a>
  <a class="ico" href="https://www.linkedin.com/in/muhammed-yunus-amini-5380b829a/" target="_blank" rel="noopener" aria-label="LinkedIn">
    <img src="assets/linkedin.png" alt="LinkedIn" width="30" height="30" />
  </a>
</div>
    </div>

    <div class="scrolldown">
      <span>{{ 'misc.scrolldown' | t }}</span>
      <svg viewBox="0 0 24 24" width="24" height="24" fill="#fff"><path d="M12 16 6 10h12l-6 6Z"/></svg>
    </div>

  </div>
</section>
