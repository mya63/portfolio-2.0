<section id="testimonials" class="testimonials section">
  <div class="t-wrap">
    <!-- Karte -->
    <article class="t-card">
      <div class="t-quote">
        <p>{{ current.text }}</p>

        <div class="t-meta">
          <span class="line purple"></span>
          <span class="author">{{ current.author }} - {{ current.role }}</span>
        </div>
      </div>

      <div class="t-avatar">
        <img [src]="current.photo" [alt]="current.author" />
      </div>
    </article>

    <!-- Controls -->
    <div class="t-controls">
      <button class="nav btn-circle" (click)="prev()" aria-label="Previous">
        <!-- left arrow -->
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M14.7 5.3a1 1 0 0 1 0 1.4L10.41 11H20a1 1 0 1 1 0 2h-9.59l4.3 4.3a1 1 0 1 1-1.42 1.4l-6-6a1 1 0 0 1 0-1.4l6-6a1 1 0 0 1 1.41 0z"/>
        </svg>
      </button>

      <div class="dots">
        <button
          *ngFor="let t of items; index as i"
          class="dot"
          [class.is-active]="i === index"
          (click)="go(i)"
          aria-label="Go to testimonial {{ i + 1 }}"
        ></button>
      </div>

      <button class="nav btn-circle" (click)="next()" aria-label="Next">
        <!-- right arrow -->
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M9.3 18.7a1 1 0 0 1 0-1.4L13.59 13H4a1 1 0 1 1 0-2h9.59l-4.3-4.3a1 1 0 1 1 1.42-1.4l6 6a1 1 0 0 1 0 1.4l-6 6a1 1 0 0 1-1.41 0z"/>
        </svg>
      </button>
    </div>
  </div>
</section>
