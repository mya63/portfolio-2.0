<section class="references section">
  <div class="container">
    <div class="quote-mark">“</div>

    <div class="ref-wrap">
      <img class="ref-photo" [src]="items[i].photo" alt="" />
      <div class="ref-card">
        <p>{{ items[i].text }}</p>
        <div class="ref-foot">
          <span class="by">{{ items[i].by }}</span>
        </div>
      </div>
    </div>

<div class="ref-dots">
  <button class="dot"
          *ngFor="let _ of items; let dotIndex = index"
          [class.active]="i === dotIndex">
  </button>
</div>

    <div class="arrows" style="display:flex;gap:12px;justify-content:center;margin-top:8px">
      <button class="btn outline" (click)="prev()">‹</button>
      <button class="btn outline" (click)="next()">›</button>
    </div>
  </div>
</section>
