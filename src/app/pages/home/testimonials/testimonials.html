<section id="testimonials" class="testimonials section">
  <div class="t-wrap">
    <article class="t-card">
      <div class="t-quote">
        <p>{{ (tKey + '.text') | t }}</p>
        <div class="t-meta">
          <span class="line purple"></span>
          <span class="author">{{ (tKey + '.author') | t }} - {{ (tKey + '.role') | t }}</span>
        </div>
      </div>
      <div class="t-avatar">
        <img [src]="items[index].photo" [alt]="(tKey + '.author') | t" />
      </div>
    </article>

    <div class="t-controls">
      <button class="nav btn-circle" (click)="prev()" aria-label="Previous">‹</button>
      <div class="dots">
        <button *ngFor="let _ of items; index as i"
                class="dot"
                [class.is-active]="i === index"
                (click)="go(i)"></button>
      </div>
      <button class="nav btn-circle" (click)="next()" aria-label="Next">›</button>
    </div>
  </div>
</section>
