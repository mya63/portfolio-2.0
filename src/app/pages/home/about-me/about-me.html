<section class="about section" id="about">
  <div class="container about-grid">
    <div class="about-text">
      <h2>{{ 'about.title' | t }}</h2>
      <p>{{ 'about.intro' | t }}</p>

      <div class="row">
        <i class="icon icon--loc" aria-hidden="true"></i>
        <p>{{ 'about.point1' | t }}</p>
      </div>

      <div class="row">
        <i class="icon icon--bulb" aria-hidden="true"></i>
        <p>{{ 'about.point2' | t }}</p>
      </div>

      <div class="row">
        <i class="icon icon--puzzle" aria-hidden="true"></i>
        <p>{{ 'about.point3' | t }}</p>
      </div>
    </div>

    <div class="about-photo">
      <span class="ring" aria-hidden="true"></span>
      <div class="avatar">
        <img src="assets/about.png" alt="Portrait" loading="lazy" />
      </div>
    </div>
  </div>
</section>
