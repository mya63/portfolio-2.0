<section id="legal" class="section">
  <div class="container">
    <div class="legal-title">
      <h1>{{ 'legal.title' | t }}</h1>
      <span class="line purple small"></span>
    </div>

    <div class="legal-content">
      <section class="block">
        <h3 class="subtitle">{{ 'legal.imprint' | t }}</h3>
        <p [innerHTML]="'legal.imprint.body' | t"></p>
      </section>

      <section class="block">
        <h3 class="subtitle">{{ 'legal.accept' | t }}</h3>
        <p class="emph" [innerHTML]="'legal.accept.body' | t"></p>
      </section>

      <section class="block">
        <h3 class="subtitle">{{ 'legal.scope' | t }}</h3>
        <p class="emph" [innerHTML]="'legal.scope.body' | t"></p>
      </section>

      <section class="block">
        <h3 class="subtitle">{{ 'legal.rights' | t }}</h3>
        <p class="emph" [innerHTML]="'legal.rights.body' | t"></p>
      </section>

      <section class="block">
        <h3 class="subtitle">{{ 'legal.use' | t }}</h3>
        <p class="emph" [innerHTML]="'legal.use.body' | t"></p>
      </section>

      <section class="block">
        <h3 class="subtitle">{{ 'legal.disclaimer' | t }}</h3>
        <p class="emph" [innerHTML]="'legal.disclaimer.body' | t"></p>
      </section>

      <section class="block">
        <h3 class="subtitle">{{ 'legal.indemnity' | t }}</h3>
        <p class="emph" [innerHTML]="'legal.indemnity.body' | t"></p>
      </section>
    </div>

    <button class="go-up" (click)="backToTop()" aria-label="Back to top">↑ {{ 'legal.backToTop' | t }}</button>
  </div>
</section>
