<section class="section">
  <div class="container privacy-hero">
    <h1 class="privacy-title">
      {{ 'privacy.title' | t }}
      <span class="line purple"></span>
    </h1>
  </div>

  <div class="container privacy-content">
    <div>
      <h3>{{ 'privacy.section1.title' | t }}</h3>
      <p [innerHTML]="'privacy.section1.body' | t"></p>
    </div>

    <div>
      <h3>{{ 'privacy.section2.title' | t }}</h3>
      <p [innerHTML]="'privacy.section2.body' | t"></p>
    </div>
  </div>

  <button class="go-up" (click)="backToTop()" aria-label="Back to top">↑ {{ 'privacy.backToTop' | t }}</button>
</section>
