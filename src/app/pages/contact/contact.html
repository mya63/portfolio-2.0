<section id="contact" class="contact section">
<div class="container">
<div class="contact-title">
<span class="line purple"></span>
<h2>{{ 'contact.title' | t }}</h2>
</div>


<div class="contact-grid">
<div class="contact-left">
<h3>Got a problem to solve?</h3>
<p>Encourage people to contact you and describe what role you are interested in. Show that you will add value to their projects through your work.</p>
<p>Need a Frontend developer? Contact me!</p>
</div>


<form class="form" (submit)="$event.preventDefault()">
<input class="field" type="text" placeholder="Your name" id="name" />
<input class="field" type="email" placeholder="Your email" id="email" />
<textarea class="field area" placeholder="Your message" id="message"></textarea>


<label class="policy">
<input id="pp" type="checkbox" />
<span>I’ve read the <a href="/privacy" class="pp-link">privacy policy</a> and agree to the processing of my data as outlined.</span>
</label>


<button class="btn primary" type="submit">{{ 'contact.send' | t }}</button>
</form>
</div>
</div>
</section>
