<section id="contact" class="contact section">
<div class="container">
<div class="contact-title">
<span class="line purple"></span>
<h2>{{ 'contact.title' | t }}</h2>
</div>


<div class="contact-grid">
<div class="contact-left">
<h3>Got a problem to solve?</h3>
<p>Encourage people to contact you and describe what role you are interested in. Show that you will add value to their projects through your work.</p>
<p>Need a Frontend developer? Contact me!</p>
</div>


<form class="form" [formGroup]="form" (ngSubmit)="submit()">
  <input class="field" type="text" placeholder="Your name" formControlName="name" />
  <input class="field" type="email" placeholder="Your email" formControlName="email" />
  <textarea class="field area" placeholder="Your message" formControlName="message"></textarea>

  <label class="policy">
    <input type="checkbox" formControlName="pp" />
    <span>I’ve read the <a routerLink="/privacy" class="pp-link">privacy policy</a> and agree.</span>
  </label>

  <button class="btn primary" type="submit" [disabled]="form.invalid">Send message</button>
</form>
</div>
</div>
</section>
