<section id="contact" class="contact section">
  <div class="contact__content">

    <div class="contact__intro">
      <h2 class="contact__title">{{ 'contact.title' | t }}</h2>

      <h3 class="contact__headline">{{ 'contact.q' | t }}</h3>
      <p class="contact__lead" [innerHTML]="'contact.lead1' | t"></p>
      <p class="contact__lead" [innerHTML]="'contact.lead2' | t"></p>
    </div>

    <!-- Form -->
    <form class="contact-form" novalidate>
      <!-- Name -->
      <div class="field">
        <input
          id="name"
          type="text"
          [placeholder]="'contact.name' | t"
          required
        />
        <small class="err">{{ 'contact.err.name' | t }}</small>
      </div>

      <!-- Email -->
      <div class="field">
        <input
          id="email"
          type="email"
          [placeholder]="'contact.email' | t"
          required
        />
        <small class="err">{{ 'contact.err.email' | t }}</small>
      </div>

      <!-- Message -->
      <div class="field">
        <textarea
          id="message"
          rows="7"
          [placeholder]="'contact.message' | t"
          required
        ></textarea>
        <small class="err">{{ 'contact.err.message' | t }}</small>
      </div>

      <!-- Privacy policy + Button -->
      <div class="policy-row">
        <label class="pp">
          <input id="pp" type="checkbox" />
          <!-- innerHTML, damit Link u. <strong> korrekt gerendert werden -->
          <span [innerHTML]="'contact.privacyHtml' | t"></span>
        </label>

        <button class="btn-send" type="submit" aria-disabled="true">
          <span>{{ 'contact.send' | t }}</span>
        </button>
      </div>
    </form>
  </div>
</section>
