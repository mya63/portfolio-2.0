<header class="header" role="banner">
  <div class="bar">
    <a class="logo" routerLink="/" (click)="closeMenu()">
      <span>Yunu</span><span class="accent">s</span>
    </a>

    <!-- Desktop Nav -->
    <nav class="nav" aria-label="Hauptmenü">
      <div class="links">
        <a
          routerLink="/"
          fragment="about"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
        >About</a>

        <a
          routerLink="/"
          fragment="skills"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
        >Skills</a>

        <a
          routerLink="/"
          fragment="portfolio"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
        >Portfolio</a>

        <a
          routerLink="/"
          fragment="contact"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: false }"
        >Contact</a>
      </div>

      <div class="lang">
        <app-lang-toggle></app-lang-toggle>
      </div>
    </nav>

    <!-- Burger -->
    <button class="burger" type="button" aria-label="Menü öffnen" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Overlay (Figma 1:1) -->
  <div class="overlay-backdrop" [class.open]="menuOpen" (click)="closeMenu()">
    <div class="overlay-frame" (click)="$event.stopPropagation()">
      <div class="overlay-header">
        <div class="overlay-logo"></div>
        <button
          class="overlay-burger"
          type="button"
          aria-label="Menü schließen"
          (click)="closeMenu()"
        >
          <span></span><span></span><span></span>
        </button>
      </div>

      <nav class="overlay-menu" aria-label="Mobile menu">
        <a class="overlay-link"
           routerLink="/"
           fragment="about"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact:false }"
           (click)="closeMenu()">About me</a>

        <a class="overlay-link"
           routerLink="/"
           fragment="skills"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact:false }"
           (click)="closeMenu()">My skills</a>

        <a class="overlay-link"
           routerLink="/"
           fragment="portfolio"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact:false }"
           (click)="closeMenu()">Portfolio</a>

        <a class="overlay-link"
           routerLink="/"
           fragment="contact"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact:false }"
           (click)="closeMenu()">Contact</a>

        <div class="overlay-lang" (click)="$event.stopPropagation()">
          <app-lang-toggle></app-lang-toggle>
        </div>
      </nav>
    </div>
  </div>
</header>
