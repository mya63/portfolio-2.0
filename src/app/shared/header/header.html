<header class="header" role="banner">
  <div class="bar">
    <a class="logo" routerLink="/" (click)="closeMenu()">
      <span>Yunu</span><span class="accent">s</span>
    </a>

    <nav class="nav" aria-label="Hauptmenü">
      <div class="links">
        <a routerLink="/" fragment="about">{{ 'nav.about' | t }}</a>
        <a routerLink="/" fragment="skills">{{ 'nav.skills' | t }}</a>
        <a routerLink="/" fragment="portfolio">{{ 'nav.portfolio' | t }}</a>
      </div>

      <div class="lang">
        <app-lang-toggle></app-lang-toggle>
      </div>
    </nav>

    <button class="burger" type="button" aria-label="Menü öffnen" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="overlay-backdrop" [class.open]="menuOpen" (click)="closeMenu()">
    <div class="overlay-frame" (click)="$event.stopPropagation()">
      <div class="overlay-header">
        <div class="overlay-logo"></div>
        <button class="overlay-burger" type="button" aria-label="Menü schließen" (click)="closeMenu()">
          <span></span><span></span><span></span>
        </button>
      </div>

      <nav class="overlay-menu" aria-label="Mobile menu">
        <a class="overlay-link" routerLink="/" fragment="about" (click)="closeMenu()">{{ 'nav.about' | t }}</a>
        <a class="overlay-link" routerLink="/" fragment="skills" (click)="closeMenu()">{{ 'nav.skills' | t }}</a>
        <a class="overlay-link" routerLink="/" fragment="portfolio" (click)="closeMenu()">{{ 'nav.portfolio' | t }}</a>
        <a class="overlay-link" routerLink="/" fragment="contact" (click)="closeMenu()">{{ 'nav.contact' | t }}</a>

        <div class="overlay-lang" (click)="$event.stopPropagation()">
          <app-lang-toggle></app-lang-toggle>
        </div>
      </nav>
    </div>
  </div>
</header>
