<header class="header" role="banner">
  <div class="bar">
    <a class="logo" routerLink="/" (click)="closeMenu()">
      <span>Yunu</span><span class="accent">s</span>
    </a>

    <nav class="nav" aria-label="Hauptmenü">
      <div class="links">
        <button type="button" (click)="navigate('about')">{{ 'nav.about' | t }}</button>
        <button type="button" (click)="navigate('skills')">{{ 'nav.skills' | t }}</button>
        <button type="button" (click)="navigate('portfolio')">{{ 'nav.portfolio' | t }}</button>
      </div>

      <div class="lang">
        <app-lang-toggle></app-lang-toggle>
      </div>
    </nav>

    <button class="burger" type="button" aria-label="Menü öffnen" (click)="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>

  <div class="overlay-backdrop" [class.open]="menuOpen" (click)="closeMenu()">
    <div class="overlay-frame" (click)="$event.stopPropagation()">
      <div class="overlay-header">
        <a class="overlay-logo" routerLink="/" (click)="closeMenu()">
          <span>Yunu</span><span class="accent">s</span>
        </a>

        <button
          class="overlay-burger"
          type="button"
          aria-label="Menü schließen"
          (click)="closeMenu()"
        >
          <span></span><span></span><span></span>
        </button>
      </div>
      <nav class="overlay-menu" aria-label="Mobile menu">
        <button class="overlay-link" type="button" (click)="navigate('about')">
          {{ 'nav.about' | t }}
        </button>

        <button class="overlay-link" type="button" (click)="navigate('skills')">
          {{ 'nav.skills' | t }}
        </button>

        <button class="overlay-link" type="button" (click)="navigate('portfolio')">
          {{ 'nav.portfolio' | t }}
        </button>

        <button class="overlay-link" type="button" (click)="navigate('contact')">
          {{ 'nav.contact' | t }}
        </button>

        <div class="overlay-lang" (click)="$event.stopPropagation()">
          <app-lang-toggle></app-lang-toggle>
        </div>
      </nav>
    </div>
  </div>
</header>
